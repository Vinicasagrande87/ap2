<div class="entrega-container">
  <h2>Endereço de Entrega</h2>

  <div class="form-grid">

    <div class="campo full">
      <label>Nome de quem vai receber</label>
      <input type="text" placeholder="Nome completo">
    </div>

    <div class="campo full">
      <label>Email</label>
      <input type="email" placeholder="email@exemplo.com">
    </div>

    <div class="campo">
      <label>Telefone de contato</label>
      <input type="tel" placeholder="(00) 00000-0000">
    </div>

    <div class="campo">
      <label>CEP</label>
      <input type="text" placeholder="00000-000" (blur)="buscarCep($event)">
    </div>

    <div class="campo full">
      <label>Rua</label>
      <input type="text" placeholder="Nome da rua">
    </div>

    <div class="campo">
      <label>Número</label>
      <input type="text" placeholder="Ex: 123">
    </div>

    <div class="campo">
      <label>Complemento</label>
      <input type="text" placeholder="Apto, Bloco, Casa...">
    </div>

    <div class="campo">
      <label>Bairro</label>
      <input type="text" placeholder="Nome do bairro">
    </div>

    <div class="campo">
      <label>Cidade</label>
      <input type="text" placeholder="Nome da cidade">
    </div>

    <div class="campo">
      <label>Estado</label>
      <select>
        <option value="">Selecione</option>
        <option>AC</option><option>AL</option><option>AP</option>
        <option>AM</option><option>BA</option><option>CE</option>
        <option>DF</option><option>ES</option><option>GO</option>
        <option>MA</option><option>MT</option><option>MS</option>
        <option>MG</option><option>PA</option><option>PB</option>
        <option>PR</option><option>PE</option><option>PI</option>
        <option>RJ</option><option>RN</option><option>RS</option>
        <option>RO</option><option>RR</option><option>SC</option>
        <option>SP</option><option>SE</option><option>TO</option>
      </select>
    </div>

    <div class="campo full">
      <label>Ponto de referência</label>
      <input type="text" placeholder="Ex: Próximo ao mercado, portão azul...">
    </div>

  </div>

  <button>Confirmar Endereço</button>
</div>
