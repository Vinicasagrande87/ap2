<div class="produto-container">
  <h2>Qual manto você busca?</h2>

  <div class="busca">
    <input type="text" placeholder="Digite o nome da camiseta..." [(ngModel)]="termoBusca" (input)="buscar()">
  </div>

  <div class="resultados" *ngIf="produtos.length > 0">
    <div class="card" *ngFor="let produto of produtos">
      
      <img [src]="produto.foto" [alt]="produto.nome">

      <div class="info">
        <h3>{{ produto.nome }}</h3>
        <p class="preco">R$ {{ produto.preco | number:'1.2-2' }}</p>

        <div class="estoque">
          <span 
            *ngFor="let tamanho of produto.tamanhos" 
            [class.sem-estoque]="tamanho.quantidade === 0">
            {{ tamanho.tamanho }}: {{ tamanho.quantidade }} un.
          </span>
        </div>
      </div>

    </div>
  </div>

  <p class="vazio" *ngIf="produtos.length === 0 && termoBusca">
    Nenhuma camiseta encontrada.
  </p>
</div>
